name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs-site/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'docs-site/**'

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run unit tests
        run: node --test --test-concurrency=1 tests/*.test.mjs

  e2e-macos:
    name: E2E (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run unit tests (macOS — catches POSIX symlink regressions)
        run: node --test --test-concurrency=1 tests/*.test.mjs
      - name: Run e2e tests
        run: node scripts/test-e2e.mjs
        env:
          RELAY_SKIP_PULL: '1'
      - name: Smoke install (from-local)
        run: |
          node scripts/installer.mjs install --from-local . --home "$RUNNER_TEMP/fake-home"
          node scripts/installer.mjs doctor --home "$RUNNER_TEMP/fake-home"
          node scripts/installer.mjs install --from-local . --home "$RUNNER_TEMP/fake-home"
          node scripts/installer.mjs uninstall --home "$RUNNER_TEMP/fake-home"
          test ! -e "$RUNNER_TEMP/fake-home/plugins/relay" && echo "PASS: link removed" || (echo "FAIL: link still exists" && exit 1)

  e2e-windows:
    name: E2E (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run unit tests (Windows — catches junction regressions)
        run: node --test --test-concurrency=1 tests/*.test.mjs
      - name: Run e2e tests
        run: node scripts/test-e2e.mjs
        env:
          RELAY_SKIP_PULL: '1'
      - name: Smoke install (from-local)
        shell: pwsh
        run: |
          $fakeHome = Join-Path $env:RUNNER_TEMP "fake-home"
          node scripts/installer.mjs install --from-local . --home $fakeHome
          node scripts/installer.mjs doctor --home $fakeHome
          node scripts/installer.mjs install --from-local . --home $fakeHome
          node scripts/installer.mjs uninstall --home $fakeHome
          if (Test-Path (Join-Path $fakeHome "plugins\relay")) {
            Write-Error "FAIL: plugin link still exists after uninstall"
            exit 1
          }
          Write-Host "PASS: link removed after uninstall"
