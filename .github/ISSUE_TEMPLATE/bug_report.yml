name: Bug report
description: Something broke
labels: ["bug"]
body:
  - type: input
    id: wyren-version
    attributes:
      label: Wyren version
      placeholder: "wyren --version output"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: "node --version output"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What command did you run? What did you expect? What did you get?
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Log output
      description: Paste the relevant lines from `wyren log` or terminal output.
      render: text
